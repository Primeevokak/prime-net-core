name: Release Build

on:
  push:
    branches: [ Release ]

jobs:
  # ── Windows build ─────────────────────────────────────────────────────────
  build-windows:
    name: Build (Windows x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          key: windows-release

      - name: Build release binaries
        run: cargo build --release --bin prime-net-engine --bin prime-tui

      - name: Package
        shell: pwsh
        run: |
          $version = (Select-String -Path Cargo.toml -Pattern '^version\s*=\s*"(.+)"').Matches[0].Groups[1].Value
          $out = "prime-net-engine-v$version-windows-x64"
          New-Item -ItemType Directory -Path $out
          Copy-Item target/release/prime-net-engine.exe $out/
          Copy-Item target/release/prime-tui.exe        $out/
          Compress-Archive -Path $out -DestinationPath "$out.zip"
          echo "ARCHIVE=$out.zip" >> $env:GITHUB_ENV
          echo "VERSION=v$version"   >> $env:GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: ${{ env.ARCHIVE }}

  # ── Linux build ───────────────────────────────────────────────────────────
  build-linux:
    name: Build (Linux x64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          key: linux-release

      - name: Install system dependencies
        run: sudo apt-get install -y libssl-dev pkg-config

      - name: Build release binaries
        run: cargo build --release --bin prime-net-engine --bin prime-tui

      - name: Package
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "//;s/"//')
          OUT="prime-net-engine-v${VERSION}-linux-x64"
          mkdir "$OUT"
          cp target/release/prime-net-engine "$OUT/"
          cp target/release/prime-tui        "$OUT/"
          tar -czf "${OUT}.tar.gz" "$OUT"
          echo "ARCHIVE=${OUT}.tar.gz" >> "$GITHUB_ENV"
          echo "VERSION=v${VERSION}"   >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: ${{ env.ARCHIVE }}

  # ── Create GitHub Release ─────────────────────────────────────────────────
  release:
    name: Publish Release
    needs: [ build-windows, build-linux ]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: ver
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "//;s/"//')
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "name=Release v${VERSION}" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/windows-x64/*.zip
            artifacts/linux-x64/*.tar.gz

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            bin_ext: ""
          - os: macos-latest
            bin_ext: ""
          - os: windows-latest
            bin_ext: .exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Detect host target
        id: target
        shell: bash
        run: |
          set -euo pipefail
          echo "target=$(rustc -vV | sed -n 's/^host: //p')" >> "$GITHUB_OUTPUT"

      - name: Build release binaries
        run: cargo build --release --locked --target ${{ steps.target.outputs.target }} --bin prime-net-engine --bin prime-tui

      - name: Stage release files
        shell: bash
        run: |
          set -euo pipefail
          REF_NAME="${GITHUB_REF_NAME//\//-}"
          TARGET="${{ steps.target.outputs.target }}"
          STAGE_DIR="dist/prime-net-engine-${REF_NAME}-${TARGET}"
          BIN_DIR="target/${TARGET}/release"
          mkdir -p "$STAGE_DIR"

          cp "$BIN_DIR/prime-net-engine${{ matrix.bin_ext }}" "$STAGE_DIR/"
          cp "$BIN_DIR/prime-tui${{ matrix.bin_ext }}" "$STAGE_DIR/"

          for f in \
            prime_net_engine_core.dll \
            prime_net_engine_core.lib \
            libprime_net_engine_core.so \
            libprime_net_engine_core.a \
            libprime_net_engine_core.dylib; do
            if [ -f "$BIN_DIR/$f" ]; then
              cp "$BIN_DIR/$f" "$STAGE_DIR/"
            fi
          done

          if [ -f README.md ]; then cp README.md "$STAGE_DIR/"; fi
          if [ -f LICENSE ]; then cp LICENSE "$STAGE_DIR/"; fi

      - name: Create tar.gz archive (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          REF_NAME="${GITHUB_REF_NAME//\//-}"
          TARGET="${{ steps.target.outputs.target }}"
          BASE="prime-net-engine-${REF_NAME}-${TARGET}"
          tar -C dist -czf "dist/${BASE}.tar.gz" "${BASE}"
          shasum -a 256 "dist/${BASE}.tar.gz" > "dist/${BASE}.tar.gz.sha256"

      - name: Create zip archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $refName = $env:GITHUB_REF_NAME -replace '/', '-'
          $target = "${{ steps.target.outputs.target }}"
          $base = "prime-net-engine-$refName-$target"
          Compress-Archive -Path "dist/$base/*" -DestinationPath "dist/$base.zip" -Force
          $hash = Get-FileHash -Algorithm SHA256 "dist/$base.zip"
          "$($hash.Hash.ToLower())  $base.zip" | Out-File -FilePath "dist/$base.zip.sha256" -Encoding ascii

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
            dist/*.zip
            dist/*.zip.sha256

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          draft: false
          prerelease: false

name: CI

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rust: [stable]

    runs-on: ${{ matrix.os }}
    env:
      CARGO_BUILD_JOBS: 1

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}

      - name: Install signature verification deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libgpg-error-dev libgpgme-dev

      - name: Install signature verification deps (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install pkg-config gpgme

      - name: Build
        run: cargo build --locked

      - name: Fmt check
        run: cargo fmt --all -- --check

      - name: Clippy (all features except Windows)
        if: runner.os != 'Windows'
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Clippy (Windows without signature verification)
        if: runner.os == 'Windows'
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Test
        run: cargo test --locked

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Security audit
        run: cargo audit

  signature-verification:
    runs-on: ubuntu-latest
    env:
      CARGO_BUILD_JOBS: 1
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install signature verification deps
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libgpg-error-dev libgpgme-dev
      - name: Build with signature verification
        run: cargo check --locked --features signature-verification

